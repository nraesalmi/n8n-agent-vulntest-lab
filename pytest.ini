[pytest]
markers =
    docker: tests that require Docker daemon access to check container state
    n8n: tests that interact with the n8n API (healthz, workflow management)
    webhook: tests that POST to n8n webhook endpoints
    slow: tests that make actual injection requests and wait for agent responses
    smoke: critical-path end-to-end test
    mock: tests that hit the mock service (:8080) or attacker listener (:9999)
    ollama: tests that check Ollama API reachability
    json_server: tests that check json-server (:3000)
